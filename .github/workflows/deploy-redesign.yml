name: Deploy Redesign Preview to GitHub Pages

on:
  push:
    branches:
      - feature/redesign

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-redesign
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          VITE_BASE_URL: /Finance_tracker/redesign/

      - name: Move build to subfolder
        run: |
          mkdir -p deploy/redesign
          cp -r dist/* deploy/redesign/
          echo '<meta http-equiv="refresh" content="0; url=redesign/">' > deploy/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./deploy

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
