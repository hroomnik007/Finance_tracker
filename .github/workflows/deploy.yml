name: Deploy to Hetzner
on:
  push:
    branches:
      - main
    paths:
      - 'finance-tracker/**'
      - 'backend/**'
      - 'landing/**'
jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      changed_frontend: ${{ steps.filter.outputs.frontend }}
      changed_backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'finance-tracker/**'
              - 'landing/**'
            backend:
              - 'backend/**'
  deploy-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.changed_frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy frontend via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -euo pipefail
            cd /var/www/finance-tracker-repo
            git fetch origin main
            git reset --hard origin/main
            cd /var/www/finance-tracker-repo/finance-tracker
            find /var/www/finance-tracker-repo/finance-tracker/node_modules -maxdepth 1 -mindepth 1 -exec rm -rf {} + 2>/dev/null || true
            npm ci --legacy-peer-deps
            export PATH="$PATH:./node_modules/.bin"
            VITE_API_URL=https://api.pedani.eu VITE_BASE_URL=/ npm run build
            sudo mkdir -p /var/www/finance-tracker/finance-tracker/dist
            sudo chown -R deploy:deploy /var/www/finance-tracker/finance-tracker/dist
            cp -r dist/* /var/www/finance-tracker/finance-tracker/dist/
            cp /var/www/finance-tracker-repo/landing/index.html /var/www/landing/index.html 2>/dev/null || true
            sudo systemctl reload nginx
  deploy-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.changed_backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy backend via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -euo pipefail
            cd /var/www/finance-tracker-repo
            git fetch origin main
            git reset --hard origin/main
            cd /var/www/finance-tracker-repo/backend
            npm ci --prefer-offline
            # Add DATABASE_URL to GitHub repo Settings → Secrets and variables → Actions
            DATABASE_URL=${{ secrets.DATABASE_URL }} npm run db:migrate
            cd /var/www/finance-tracker-repo
            docker compose build backend
            docker compose up -d --no-deps backend
