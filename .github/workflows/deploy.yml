name: Deploy to Hetzner
on:
  push:
    branches:
      - main
    paths:
      - 'finance-tracker/**'
      - 'backend/**'
jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      changed_frontend: ${{ steps.filter.outputs.frontend }}
      changed_backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'finance-tracker/**'
            backend:
              - 'backend/**'
  deploy-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.changed_frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy frontend via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -euo pipefail
            cd /var/www/finance-tracker
            git fetch origin main
            git reset --hard origin/main
            cd finance-tracker
            sudo mkdir -p dist
            sudo chown -R deploy:deploy dist
            npm ci --prefer-offline --legacy-peer-deps
            VITE_API_URL=https://api.pedani.eu npm run build
            sudo systemctl reload nginx
  deploy-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.changed_backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy backend via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -euo pipefail
            cd /var/www/finance-tracker
            git fetch origin main
            git reset --hard origin/main
            cd backend
            npm ci --prefer-offline
            npm run build
            npm run db:migrate
            pm2 restart finance-tracker-api
