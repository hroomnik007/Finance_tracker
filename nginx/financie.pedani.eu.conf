server {
    listen 80;
    listen [::]:80;
    server_name financie.pedani.eu;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name financie.pedani.eu;

    # ── SSL (managed by Certbot) ─────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/financie.pedani.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/financie.pedani.eu/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Document root ────────────────────────────────────────────────────────
    root  /var/www/finance-tracker/dist;
    index index.html;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml
        font/woff2;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options           "DENY"                    always;
    add_header X-Content-Type-Options    "nosniff"                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header X-XSS-Protection          "1; mode=block"           always;

    # ── Cache: immutable static assets (1 year) ───────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Frame-Options        "DENY"    always;
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # ── Cache: service worker — never cache ───────────────────────────────────
    location = /sw.js {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header X-Frame-Options        "DENY"    always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── Cache: index.html — no-store (PWA must always get fresh shell) ────────
    location = /index.html {
        expires off;
        add_header Cache-Control "no-store";
        add_header X-Frame-Options        "DENY"    always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── SPA fallback — all routes serve index.html ───────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        expires off;
        add_header Cache-Control "no-store";
        add_header X-Frame-Options        "DENY"    always;
        add_header X-Content-Type-Options "nosniff" always;
    }
}
