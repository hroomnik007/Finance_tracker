services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "3001:3001"
    networks:
      - finance-tracker_default
    external_links:
      - finance-tracker-postgres-1:postgres

networks:
  finance-tracker_default:
    external: true

volumes:
  postgres_data:
